# RAG Configuration

embedding:
  model: "sentence-transformers/all-MiniLM-L6-v2"

vector_store:
  type: "chroma"
  persist_directory: "data/chroma_db"
  collection_name: "rag_collection"

llm:
  model: "gpt-3.5-turbo"
  temperature: 0.7
  max_tokens: 500

retrieval:
  top_k: 7
  # Reciprocal Rank Fusion constant (higher = smoother rank blending)
  rrf_k: 60
  # Graph traversal hops from top-k seed chunks
  graph_hops: 1

chunking:
  chunk_size: 500
  chunk_overlap: 50
